- type: entity
  id: BulletCaselessTungsten
  name: bullet (5x75 tungsten)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 35
        Blunt: 10
        Structural: 75
      armorPenetration: 0.5
  - type: StaminaDamageOnCollide
    damage: 20

- type: entity
  id: BaseCartridgeCaselessTungsten
  name: cartridge (5x75 tungsten)
  description: A large, heavy tungsten round shot using fusion technology. May god have mercy on your arms if you try to shoot this without any exoskeleton assistance.
  parent: [ BaseCartridge ]
  abstract: true
  components:
  - type: Contraband
    allowedDepartments: [ CentralCommand ]
    severity: Restricted
  - type: Tag
    tags:
      - Cartridge
      - CartridgeCaselessTungsten
  - type: CartridgeAmmo
    deleteOnSpawn: true
  - type: Sprite
    noRot: false
    sprite: _Omu/Objects/Weapons/Guns/Ammunition/Casings/tungsten.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 25

- type: entity
  id: CartridgeCaselessTungsten
  name: cartridge (5x75 tungsten)
  parent: BaseCartridgeCaselessTungsten
  components:
  - type: CartridgeAmmo
    proto: BulletCaselessTungsten

- type: entity
  id: BaseMagazineCaselessTungsten
  name: "magazine (5x75 tungsten)"
  parent: [ BaseItem ]
  abstract: true
  components:
  - type: Contraband
    allowedDepartments: [ CentralCommand ]
    severity: Restricted
  - type: Tag
    tags:
      - MagazineCaselessTungsten
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeCaselessTungsten
    proto: CartridgeCaselessTungsten
    capacity: 35
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite:  _Omu/Objects/Weapons/Guns/Ammunition/Magazine/caselesstungsten.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MagazineCaselessTungsten
  name: "magazine (5x75 tungsten)"
  parent: BaseMagazineCaselessTungsten
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeCaselessTungsten
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
