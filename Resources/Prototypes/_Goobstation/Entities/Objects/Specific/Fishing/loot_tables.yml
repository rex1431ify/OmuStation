# Omu end

# Items from Lava
- type: entityTable
  id: LavaFishingLootTable
  table: !type:GroupSelector
    children:
      # omu salvage fishing real
      - !type:NestedSelector
        tableId: LavaFishTableCommon
        weight: 50
      - !type:NestedSelector
        tableId: LavaFishTableUncommon
        weight: 30
      - !type:NestedSelector
        tableId: LavaFishTableRare
        weight: 17
      - !type:NestedSelector
        tableId: InsaneFishTable
        weight: 3
        
# Items from Plasma
- type: entityTable
  id: PlasmaFishingLootTable
  table: !type:GroupSelector
    children:
    # TODO: lava/plasma fish
      - !type:NestedSelector
        tableId: BasicFishingLootTable

# Items from Toilets
- type: entityTable
  id: ToiletFishingLootTable
  table: !type:GroupSelector
    children:
      # like water but no rare fishes
      - !type:NestedSelector
        tableId: BasicFishingLootTable
        weight: 80
      - !type:NestedSelector
        tableId: WaterFishTable
        weight: 20
