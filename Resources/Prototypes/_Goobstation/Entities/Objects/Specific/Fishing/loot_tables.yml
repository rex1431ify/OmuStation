# This should be on every other fishing table
- type: entityTable
  id: BasicFishingLootTable
  table: !type:GroupSelector
    children:
    # 75% chance of scrap of some kind
    - !type:GroupSelector
      weight: 75
      children:
      - !type:NestedSelector
        tableId: SalvageScrapLowValue
        weight: 65
      - !type:NestedSelector
        tableId: SalvageScrapHighValue
        weight: 35
    # 15% chance of some trash
    - !type:NestedSelector
      tableId: GenericTrashItems
      weight: 15
    # 10% chance of low-value treasure or maintenance tools
    - !type:GroupSelector
      weight: 10
      children:
      - !type:NestedSelector
        tableId: SalvageTreasureCommon
      - !type:NestedSelector
        tableId: MaintToolsTable

# All types of the rare and unique fishes
- type: entityTable
  id: RareFishTable
  table: !type:GroupSelector
    children:
    - id: FishAlien
    - id: FishBingle
    - id: FishBoyFisher
    - id: FishNukeDisk
    - id: FishGib
    - id: FishMutant
    - id: FishNuker
    - id: FishToxic
    - id: FishIan
    - id: CrateCargoGambling #omu
    - id: MobShark #omu

- type: entityTable # omu
  id: InsaneFishTable
  table: !type:GroupSelector
    children:
    - id: MobDragonDungeon  # This one dies pretty easy its just gonna be funny
    - id: NukeDiskFake
    - id: ClothingOuterHardsuitCarp
    - id: FoodSnackLollypopWrappedCarpEvil # Omu
    - id: CombatMedipen # Omu
    - id: MobXenomorphMaid # Omu
    - id: MedkitCombatFilled
    - id: PlushieRestful # Omu

# Fish from water
- type: entityTable
  id: WaterFishTable
  table: !type:GroupSelector
    children:
    - id: FishAngler
    - id: FishBass
    - id: FishBlob
    - id: FishBlueFintuna
    - id: FishCat
    - id: FishTropicalClown
    - id: FishPuffer
    - id: FishSilver
    - id: FishTropicalSun
    - id: FishTropical
    - id: MobSpaceShrimp # omu
    - id: MobCrab # omu
    - id: MobCarpGoldfish # omu
# Items from Water
- type: entityTable
  id: WaterFishingLootTable
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        tableId: BasicFishingLootTable
        weight: 40
      - !type:NestedSelector
        tableId: WaterFishTable
        weight: 50
      - !type:NestedSelector
        tableId: RareFishTable
        weight: 9
      - !type:NestedSelector
        tableId: InsaneFishTable
        weight: 1

